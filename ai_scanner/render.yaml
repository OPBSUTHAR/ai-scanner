services:
  - type: web
    name: ai-scanner
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/your-repo-name
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: ./ai_scanner
    envVars:
      - key: PORT
        value: 8000
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "False"
      - key: DATA_DIR
        value: /app/data
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: DROPBOX_ACCESS_TOKEN
        sync: false
      - key: ONEDRIVE_CLIENT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_SECRET
        sync: false
      - key: ONEDRIVE_TENANT_ID
        sync: false
