<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI SCANNER // PHONE CAM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;background:#000;overflow:hidden;font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;touch-action:none}

/* Fullscreen camera */
#video{width:100%;height:100%;object-fit:cover;position:fixed;inset:0;z-index:1}

/* Capture button */
#capture-btn{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:10;
  width:80px;height:80px;border-radius:50%;border:4px solid rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.15);cursor:pointer;
  transition:0.15s;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);box-shadow:0 0 40px rgba(0,242,254,0.2);
}
#capture-btn::after{
  content:'';width:60px;height:60px;border-radius:50%;
  background:#fff;transition:0.15s;box-shadow:0 0 20px rgba(255,255,255,0.3);
}
#capture-btn:active{transform:translateX(-50%) scale(0.92)}
#capture-btn:active::after{width:50px;height:50px}

/* Top bar */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;padding-top:calc(env(safe-area-inset-top, 0px) + 14px);
  background:linear-gradient(180deg,rgba(0,0,0,0.7) 60%,transparent);
}
.top-bar .title{color:#fff;font-size:13px;font-weight:700;letter-spacing:0.5px}
.top-bar .title span{color:#00F2FE}
.top-bar .close-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.12);color:#fff;font-size:18px;
  cursor:pointer;backdrop-filter:blur(8px);display:flex;
  align-items:center;justify-content:center;transition:0.2s;
}
.top-bar .close-btn:active{background:rgba(255,255,255,0.25)}

/* Bottom controls */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 16px);
  background:linear-gradient(0deg,rgba(0,0,0,0.6) 60%,transparent);
}
.bottom-bar .side-btn{
  width:48px;height:48px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);color:#fff;font-size:20px;
  cursor:pointer;backdrop-filter:blur(8px);display:flex;
  align-items:center;justify-content:center;transition:0.2s;
}
.bottom-bar .side-btn:active{background:rgba(255,255,255,0.2);transform:scale(0.9)}

/* Flash / status */
#flash-status{
  position:fixed;top:calc(env(safe-area-inset-top, 0px) + 64px);right:18px;z-index:10;
  font-size:11px;font-weight:600;letter-spacing:0.3px;color:rgba(255,255,255,0.4);
  font-family:monospace;background:rgba(0,0,0,0.3);padding:4px 10px;
  border-radius:6px;backdrop-filter:blur(4px);display:none;
}

/* FPS counter */
#fps-counter{
  position:fixed;top:calc(env(safe-area-inset-top, 0px) + 64px);left:18px;z-index:10;
  font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);
  font-family:monospace;
}

/* Status indicator */
#status-dot{
  width:6px;height:6px;border-radius:50%;background:#00F5D4;
  display:inline-block;margin-right:6px;box-shadow:0 0 8px #00F5D4;
  animation:pulse 1.5s ease-in-out infinite;vertical-align:middle;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Toast */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom, 0px) + 140px);
  left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(0,0,0,0.85);color:#fff;backdrop-filter:blur(12px);
  padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;
  font-family:monospace;border:1px solid rgba(255,255,255,0.08);
  animation:toastIn 0.3s ease;transition:0.3s;text-align:center;
  white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>

<div class="top-bar">
  <div class="title"><span>◈</span> AI SCANNER</div>
  <button class="close-btn" id="close-btn">✕</button>
</div>

<div id="fps-counter">-- FPS</div>
<div id="flash-status">⚡ FLASH ON</div>

<div class="bottom-bar">
  <button class="side-btn" id="flash-btn">☀</button>
  <div id="capture-btn"></div>
  <button class="side-btn" id="flip-btn">⟳</button>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
var stream=null, facing='environment', flashOn=false, captureCount=0;
var frameCount=0, fps=0, fpsTimer=0;

var baseUrl=window.location.origin;

/* Show toast */
function showToast(msg){
  var t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove()},300)},1500);
}

/* Start camera */
function startCam(f){
  if(stream){stream.getTracks().forEach(function(t){t.stop()})}
  var constraints={
    video:{facingMode:f,width:{ideal:1920},height:{ideal:1080}},
    audio:false
  };
  navigator.mediaDevices.getUserMedia(constraints).then(function(s){
    stream=s;
    document.getElementById('video').srcObject=s;
    document.getElementById('fps-counter').textContent='◉ STREAMING';
    fpsTimer=Date.now();
    frameCount=0;
    startFpsCount();
  }).catch(function(e){
    showToast('Camera error: '+e.message);
  });
}

/* FPS counter */
function startFpsCount(){
  var v=document.getElementById('video');
  var el=document.getElementById('fps-counter');
  setInterval(function(){
    if(v.readyState>=2){
      var now=Date.now();
      if(now-fpsTimer>=1000){
        el.textContent=fps+' FPS';
        fps=0;
        fpsTimer=now;
      }
    }
  },500);
  v.addEventListener('timeupdate',function(){fps++});
}

/* Capture photo */
document.getElementById('capture-btn').addEventListener('click',function(){
  var v=document.getElementById('video'),c=document.getElementById('canvas'),ctx=c.getContext('2d');
  if(!v.videoWidth){showToast('Camera not ready');return}
  c.width=v.videoWidth;c.height=v.videoHeight;
  ctx.drawImage(v,0,0,c.width,c.height);
  c.toBlob(function(blob){
    captureCount++;
    // Send to relay endpoint
    fetch(baseUrl+'/api/relay-frame',{method:'POST',body:blob});
    // Animate capture
    var btn=document.getElementById('capture-btn');
    btn.style.transform='translateX(-50%) scale(0.9)';
    btn.style.boxShadow='0 0 60px rgba(255,255,255,0.5)';
    setTimeout(function(){
      btn.style.transform='translateX(-50%) scale(1)';
      btn.style.boxShadow='0 0 40px rgba(0,242,254,0.2)';
    },150);
    showToast('📸 Captured! ('+captureCount+')');
  },'image/jpeg',0.92);
});

/* Flip camera */
document.getElementById('flip-btn').addEventListener('click',function(){
  facing=(facing==='environment')?'user':'environment';
  startCam(facing);
  showToast(facing==='environment'?'Rear camera':'Front camera');
});

/* Flash toggle */
document.getElementById('flash-btn').addEventListener('click',function(){
  flashOn=!flashOn;
  var el=document.getElementById('flash-status');
  if(flashOn){
    // Try to enable torch
    try{
      var track=stream.getVideoTracks()[0];
      track.applyConstraints({advanced:[{torch:true}]});
    }catch(e){}
    el.style.display='block';
  }else{
    try{
      var track=stream.getVideoTracks()[0];
      track.applyConstraints({advanced:[{torch:false}]});
    }catch(e){}
    el.style.display='none';
  }
});

/* Close / go back */
document.getElementById('close-btn').addEventListener('click',function(){
  if(stream){stream.getTracks().forEach(function(t){t.stop()})}
  try{window.close()}catch(e){}
  // fallback: redirect to main
  if(!window.closed)window.location.href=baseUrl;
});

/* Start on load */
startCam('environment');
</script>
</body>
</html>
